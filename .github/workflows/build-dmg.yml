# Builds a Release DMG on every push (artifact).
# - Push to main/master: rolling pre-release at tag `continuous` + workflow artifact.
# - Push tag v*: versioned GitHub Release + artifact (only if the tag push was not made
#   with the default GITHUB_TOKEN; see `versioned-release-after-changesets.yml`).

name: Build DMG

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Job-level `contents: write` cannot exceed workflow-level permissions. Releases need
# `contents: write` on the default GITHUB_TOKEN (see softprops/action-gh-release).
permissions:
  contents: write

jobs:
  dmg:
    # macOS 26 + Xcode 26 SDK required (Liquid Glass APIs, deployment target 26.0).
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Build DMG
        env:
          SIGN_IDENTITY: ${{ secrets.SIGN_IDENTITY }}
          NOTARY_PROFILE: ${{ secrets.NOTARY_PROFILE }}
        run: ./scripts/build-dmg.sh

      - name: Locate DMG
        id: dmg
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(dist/GitPersona-*.dmg)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "error: expected dist/GitPersona-<version>.dmg" >&2
            ls -la dist || true
            exit 1
          fi
          echo "file=${files[0]}" >> "$GITHUB_OUTPUT"
          echo "Built artifact: ${files[0]}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitPersona-macos
          path: ${{ steps.dmg.outputs.file }}
          if-no-files-found: error

      - name: Point continuous tag at this commit
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag -f continuous "${GITHUB_SHA}"
          git push -f origin refs/tags/continuous

      - name: Publish rolling pre-release (main/master)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous build
          prerelease: true
          make_latest: false
          files: ${{ steps.dmg.outputs.file }}
          body: |
            Latest DMG built from the tip of the default branch (`main` / `master`).

            For a stable, versioned build, use a **Release** whose tag matches `v*.*.*`.

      - name: Publish GitHub Release (tags only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.dmg.outputs.file }}
          generate_release_notes: true
